name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile check
        run: python -m py_compile src/upservice_mcp/server.py

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Build and install package
        run: uv pip install --system -e .

      - name: Import server module
        run: python -c "import upservice_mcp.server"

  # Moves the floating `stable` tag to this commit once the build above passes. Colleagues
  # point uvx at `@stable` and get whatever last passed CI on main automatically -- no one
  # has to remember to cut a new version tag for routine fixes. Cut a real vN.N.N tag (and
  # GitHub release) separately for anything you want to freeze/reference by name.
  promote-stable:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Move stable tag to this commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f stable
          git push origin stable --force
